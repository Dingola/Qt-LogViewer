name: Doc Agent Analyzer

#------------------------------------------------
# Workflow Triggers
#------------------------------------------------
on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'QT_Project/**'
      - 'QT_Project_Tests/**'
      - 'Configs/**'
  workflow_dispatch:
    inputs:
      full_scan:
        description: Analyze repository documentation inputs and refresh wiki staging
        required: false
        default: true
        type: boolean
      rebuild_all_pages:
        description: Force regeneration of all wiki pages
        required: false
        default: false
        type: boolean

#------------------------------------------------
# Permissions
#------------------------------------------------
permissions:
  contents: write
  pull-requests: write
  models: read

#------------------------------------------------
# Environment Variables
#------------------------------------------------
env:
  WIKI_STAGING_DIR: .github/wiki-staging
  WIKI_MANIFEST_FILE: .wiki-managed-files
  DOC_AGENT_PROMPT_FILE: .github/prompts/doc_agent_analyzer.prompt.yml

#------------------------------------------------
# Workflow jobs
#------------------------------------------------
jobs:
  doc_agent_analyzer:
    name: Doc-Agent Analyze and Stage Wiki Content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install GitHub Models extension
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh extension install https://github.com/github/gh-models || gh extension upgrade gh-models

      - name: Doc-Agent - Detect documentation inputs to analyze
        id: doc_agent_detect
        shell: bash
        run: |
          before_sha="${{ github.event.before }}"
          after_sha="${{ github.sha }}"
          zero_sha="0000000000000000000000000000000000000000"
          full_scan_requested=false
          rebuild_all_pages=false
          changed_files=""

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.full_scan }}" == "true" ]]; then
            full_scan_requested=true
            changed_files="$(git ls-files README.md QT_Project QT_Project_Tests Configs 2>/dev/null || true)"
          else
            if [[ -n "$before_sha" && "$before_sha" != "$zero_sha" ]]; then
              changed_files="$(git diff --name-only "$before_sha" "$after_sha")"
            else
              changed_files="$(git ls-files README.md QT_Project QT_Project_Tests Configs 2>/dev/null || true)"
            fi
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.rebuild_all_pages }}" == "true" ]]; then
            rebuild_all_pages=true
          fi

          readme_changed=false
          source_comments_changed=false
          tests_changed=false
          configs_changed=false
          relevant_change_detected=false

          update_home=false
          update_build_and_run=false
          update_project_structure=false
          update_architecture=false
          update_testing=false
          update_configuration=false
          update_documentation_review=false

          while IFS= read -r file; do
            if [[ -n "$file" ]]; then
              case "$file" in
                README.md)
                  readme_changed=true
                  relevant_change_detected=true
                  update_home=true
                  update_build_and_run=true
                  update_project_structure=true
                  update_testing=true
                  update_configuration=true
                  ;;
                QT_Project/Headers/Qt-LogViewer/Controllers/*|QT_Project/Sources/Qt-LogViewer/Controllers/*|QT_Project/Headers/Qt-LogViewer/Models/*|QT_Project/Sources/Qt-LogViewer/Models/*|QT_Project/Headers/Qt-LogViewer/Services/*|QT_Project/Sources/Qt-LogViewer/Services/*|QT_Project/Headers/Qt-LogViewer/Views/*|QT_Project/Sources/Qt-LogViewer/Views/*|QT_Project/Forms/*)
                  source_comments_changed=true
                  relevant_change_detected=true
                  update_home=true
                  update_project_structure=true
                  update_architecture=true
                  ;;
                QT_Project/CMake/*|QT_Project/CMakeLists.txt|QT_Project/Config.h.in|QT_Project/ThirdParty/*|QT_Project/main.cpp|QT_Project/resources.qrc)
                  source_comments_changed=true
                  relevant_change_detected=true
                  update_home=true
                  update_build_and_run=true
                  update_project_structure=true
                  update_configuration=true
                  ;;
                QT_Project/Resources/*)
                  source_comments_changed=true
                  relevant_change_detected=true
                  update_home=true
                  update_project_structure=true
                  ;;
                QT_Project/*)
                  source_comments_changed=true
                  relevant_change_detected=true
                  update_home=true
                  update_project_structure=true
                  ;;
                QT_Project_Tests/*)
                  tests_changed=true
                  relevant_change_detected=true
                  update_home=true
                  update_testing=true
                  update_project_structure=true
                  ;;
                Configs/*)
                  configs_changed=true
                  relevant_change_detected=true
                  update_home=true
                  update_build_and_run=true
                  update_configuration=true
                  ;;
              esac
            fi
          done <<< "$changed_files"

          if [[ "$rebuild_all_pages" == "true" ]]; then
            update_home=true
            update_build_and_run=true
            update_project_structure=true
            update_architecture=true
            update_testing=true
            update_configuration=true
          fi

          if [[ "$relevant_change_detected" == "true" ]]; then
            update_documentation_review=true
          fi

          {
            echo "full_scan_requested=$full_scan_requested"
            echo "rebuild_all_pages=$rebuild_all_pages"
            echo "readme_changed=$readme_changed"
            echo "source_comments_changed=$source_comments_changed"
            echo "tests_changed=$tests_changed"
            echo "configs_changed=$configs_changed"
            echo "relevant_change_detected=$relevant_change_detected"
            echo "update_home=$update_home"
            echo "update_build_and_run=$update_build_and_run"
            echo "update_project_structure=$update_project_structure"
            echo "update_architecture=$update_architecture"
            echo "update_testing=$update_testing"
            echo "update_configuration=$update_configuration"
            echo "update_documentation_review=$update_documentation_review"
            echo "changed_files<<EOF"
            echo "$changed_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Doc-Agent - Build AI analysis input
        if: steps.doc_agent_detect.outputs.relevant_change_detected == 'true'
        shell: bash
        env:
          REPOSITORY_NAME: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          FULL_SCAN_REQUESTED: ${{ steps.doc_agent_detect.outputs.full_scan_requested }}
          README_CHANGED: ${{ steps.doc_agent_detect.outputs.readme_changed }}
          SOURCE_COMMENTS_CHANGED: ${{ steps.doc_agent_detect.outputs.source_comments_changed }}
          TESTS_CHANGED: ${{ steps.doc_agent_detect.outputs.tests_changed }}
          CONFIGS_CHANGED: ${{ steps.doc_agent_detect.outputs.configs_changed }}
          CHANGED_FILES: ${{ steps.doc_agent_detect.outputs.changed_files }}
        run: |
          output_file="${RUNNER_TEMP}/doc_agent_input.md"
          inventory_dir="${RUNNER_TEMP}/doc_agent_inventory"
          max_total_chars=24000
          max_file_chars=2500
          max_inventory_items_per_group=20
          total_chars=0

          rm -rf "$inventory_dir"
          mkdir -p "$inventory_dir"

          is_monitored() {
            case "$1" in
              README.md|QT_Project/*|QT_Project_Tests/*|Configs/*) return 0 ;;
              *) return 1 ;;
            esac
          }

          is_text_analysis_file() {
            case "$1" in
              README.md|CMakeLists.txt|*.md|*.txt|*.cmake|*.yml|*.yaml|*.json|*.xml|*.ui|*.h|*.hpp|*.cpp|*.cxx|*.in)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          append_text() {
            local text="$1"
            local text_len
            text_len=$(printf "%s" "$text" | wc -c)

            if (( total_chars + text_len > max_total_chars )); then
              return
            fi

            printf "%s" "$text" >> "$output_file"
            total_chars=$((total_chars + text_len))
          }

          normalize_inventory_entry() {
            local entry_name="$1"

            entry_name="${entry_name%.hpp}"
            entry_name="${entry_name%.h}"
            entry_name="${entry_name%.cpp}"
            entry_name="${entry_name%.cxx}"
            entry_name="${entry_name%.ui}"
            entry_name="${entry_name%.cmake}"
            entry_name="${entry_name%.yml}"
            entry_name="${entry_name%.yaml}"
            entry_name="${entry_name%.json}"
            entry_name="${entry_name%.xml}"
            entry_name="${entry_name%.in}"

            printf "%s" "$entry_name"
          }

          add_inventory_entry() {
            local file_path="$1"
            local category=""
            local entry_name=""

            case "$file_path" in
              QT_Project/Headers/Qt-LogViewer/Controllers/*|QT_Project/Sources/Qt-LogViewer/Controllers/*)
                category="Controllers"
                ;;
              QT_Project/Headers/Qt-LogViewer/Models/*|QT_Project/Sources/Qt-LogViewer/Models/*)
                category="Models"
                ;;
              QT_Project/Headers/Qt-LogViewer/Services/*|QT_Project/Sources/Qt-LogViewer/Services/*)
                category="Services"
                ;;
              QT_Project/Headers/Qt-LogViewer/Views/*|QT_Project/Sources/Qt-LogViewer/Views/*)
                category="Views"
                ;;
              QT_Project/Forms/*)
                category="Forms"
                ;;
              QT_Project_Tests/Headers/Qt-LogViewer/Controllers/*|QT_Project_Tests/Sources/Qt-LogViewer/Controllers/*)
                category="Test Controllers"
                ;;
              QT_Project_Tests/Headers/Qt-LogViewer/Models/*|QT_Project_Tests/Sources/Qt-LogViewer/Models/*)
                category="Test Models"
                ;;
              QT_Project_Tests/Headers/Qt-LogViewer/Services/*|QT_Project_Tests/Sources/Qt-LogViewer/Services/*)
                category="Test Services"
                ;;
              QT_Project_Tests/Headers/Qt-LogViewer/Views/*|QT_Project_Tests/Sources/Qt-LogViewer/Views/*)
                category="Test Views"
                ;;
              Configs/*|QT_Project/CMake/*|QT_Project_Tests/CMakeLists.txt|QT_Project/CMakeLists.txt|QT_Project/ThirdParty/*|QT_Project_Tests/ThirdParty/*)
                category="Build and Config"
                ;;
            esac

            if [[ -n "$category" ]]; then
              entry_name="$(basename "$file_path")"
              entry_name="$(normalize_inventory_entry "$entry_name")"

              if [[ -n "$entry_name" ]]; then
                printf "%s\n" "$entry_name" >> "${inventory_dir}/${category}.txt"
              fi
            fi
          }

          append_inventory_group() {
            local category="$1"
            local category_file="${inventory_dir}/${category}.txt"
            local item_count=0

            if [[ -s "$category_file" ]]; then
              append_text "### ${category}"$'\n'

              while IFS= read -r inventory_entry; do
                if [[ -n "$inventory_entry" ]]; then
                  append_text "- \`${inventory_entry}\`"$'\n'
                  item_count=$((item_count + 1))

                  if (( item_count >= max_inventory_items_per_group )); then
                    append_text "- Additional entries omitted for brevity."$'\n'
                    break
                  fi
                fi
              done < <(sort -u "$category_file")

              append_text $'\n'
            fi
          }

          append_file_section() {
            local file_path="$1"

            if ! is_monitored "$file_path"; then
              return
            fi

            if ! is_text_analysis_file "$file_path"; then
              return
            fi

            if [[ ! -f "$file_path" ]]; then
              return
            fi

            local excerpt
            excerpt="$(head -c "$max_file_chars" "$file_path")"

            append_text "$(printf '\n## File: %s\n\n```text\n%s\n```\n' "$file_path" "$excerpt")"
          }

          : > "$output_file"

          cat > "${RUNNER_TEMP}/doc_agent_header.md" <<EOF
          # Doc-Agent Analysis Input

          - Repository: ${REPOSITORY_NAME}
          - Commit: ${COMMIT_SHA}
          - Full scan requested: ${FULL_SCAN_REQUESTED}
          - README changed: ${README_CHANGED}
          - Source comments changed: ${SOURCE_COMMENTS_CHANGED}
          - Tests changed: ${TESTS_CHANGED}
          - Configs changed: ${CONFIGS_CHANGED}

          ## Changed Files
          EOF

          append_text "$(cat "${RUNNER_TEMP}/doc_agent_header.md")"
          append_text $'\n'

          if [[ -n "$CHANGED_FILES" ]]; then
            while IFS= read -r file; do
              if [[ -n "$file" ]]; then
                append_text "- \`$file\`"$'\n'
                add_inventory_entry "$file"
              fi
            done <<< "$CHANGED_FILES"
          else
            append_text "- None"$'\n'
          fi

          append_text $'\n'
          append_text "## Repository Inventory"$'\n'$'\n'

          append_inventory_group "Controllers"
          append_inventory_group "Models"
          append_inventory_group "Services"
          append_inventory_group "Views"
          append_inventory_group "Forms"
          append_inventory_group "Test Controllers"
          append_inventory_group "Test Models"
          append_inventory_group "Test Services"
          append_inventory_group "Test Views"
          append_inventory_group "Build and Config"

          append_file_section "README.md"

          while IFS= read -r changed_file; do
            if [[ -n "$changed_file" ]]; then
              append_file_section "$changed_file"
            fi
          done <<< "$CHANGED_FILES"

          test -s "$output_file"
          echo "AI input written to $output_file"

      - name: Doc-Agent - Generate targeted wiki staging with GitHub Models
        if: steps.doc_agent_detect.outputs.relevant_change_detected == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          UPDATE_HOME: ${{ steps.doc_agent_detect.outputs.update_home }}
          UPDATE_BUILD_AND_RUN: ${{ steps.doc_agent_detect.outputs.update_build_and_run }}
          UPDATE_PROJECT_STRUCTURE: ${{ steps.doc_agent_detect.outputs.update_project_structure }}
          UPDATE_ARCHITECTURE: ${{ steps.doc_agent_detect.outputs.update_architecture }}
          UPDATE_TESTING: ${{ steps.doc_agent_detect.outputs.update_testing }}
          UPDATE_CONFIGURATION: ${{ steps.doc_agent_detect.outputs.update_configuration }}
          UPDATE_DOCUMENTATION_REVIEW: ${{ steps.doc_agent_detect.outputs.update_documentation_review }}
        run: |
          mkdir -p "${{ env.WIKI_STAGING_DIR }}"

          should_generate_page() {
            local update_flag="$1"
            local target_file="$2"

            if [[ "$update_flag" == "true" || ! -f "${{ env.WIKI_STAGING_DIR }}/$target_file" ]]; then
              echo "true"
            else
              echo "false"
            fi
          }

          write_page_requirements() {
            local page_key="$1"
            local requirements_file="$2"

            case "$page_key" in
              home_md)
                cat > "$requirements_file" <<'EOF'
            ## Target Page Requirements
            - Page key: `home_md`
            - Output file: `Home.md`
            - Must begin with exactly:
              <!-- page-ownership: automation-managed -->
              <!-- manual-pages: pages not listed in .wiki-managed-files are treated as manual-only -->
            - Include:
              - `# Qt-LogViewer Wiki`
              - `## Overview`
              - a concise project-specific overview grounded in the input
              - `## Navigation`
              - links for `[[Build-and-Run]]`, `[[Project-Structure]]`, `[[Architecture]]`, `[[Testing]]`, `[[Configuration]]`, and `[[Documentation-Review]]`
              - `## Ownership`
              - `## Current Review Snapshot`
              - `## Repository Sources`
            EOF
                            ;;
                          build_and_run_md)
                            cat > "$requirements_file" <<'EOF'
            ## Target Page Requirements
            - Page key: `build_and_run_md`
            - Output file: `Build-and-Run.md`
            - Must begin with:
              <!-- page-ownership: automation-managed -->
            - Include:
              - `# Build and Run`
              - `## Overview`
              - `## Prerequisites`
              - `## Configure and Build`
              - `## Run`
              - `## Deployment and Docker Notes`
            - Use only build and run details supported by the input.
            EOF
                            ;;
                          project_structure_md)
                            cat > "$requirements_file" <<'EOF'
            ## Target Page Requirements
            - Page key: `project_structure_md`
            - Output file: `Project-Structure.md`
            - Must begin with:
              <!-- page-ownership: automation-managed -->
            - Include:
              - `# Project Structure`
              - `## Overview`
              - `## Main Directories`
              - `## Notes`
            - Use actual repository folders and concrete directory paths from the input.
            EOF
                            ;;
                          architecture_md)
                            cat > "$requirements_file" <<'EOF'
            ## Target Page Requirements
            - Page key: `architecture_md`
            - Output file: `Architecture.md`
            - Must begin with:
              <!-- page-ownership: automation-managed -->
            - Include:
              - `# Architecture`
              - `## Overview`
              - `## Main Responsibilities`
              - `## Data and Interaction Flow`
              - `## Notes`
            - Tie architecture descriptions to concrete classes, files, directories, and repository inventory entries from the input.
            - Explain interaction flow in grounded terms such as file selection, ingestion, parsing, loading, filtering, paging, UI coordination, and session persistence only when supported by the input.
            EOF
                            ;;
                          testing_md)
                            cat > "$requirements_file" <<'EOF'
            ## Target Page Requirements
            - Page key: `testing_md`
            - Output file: `Testing.md`
            - Must begin with:
              <!-- page-ownership: automation-managed -->
            - Include:
              - `# Testing`
              - `## Overview`
              - `## Test Project`
              - `## CI and Coverage`
              - `## Notes`
            - Use only information supported by the input.
            EOF
                            ;;
                          configuration_md)
                            cat > "$requirements_file" <<'EOF'
            ## Target Page Requirements
            - Page key: `configuration_md`
            - Output file: `Configuration.md`
            - Must begin with:
              <!-- page-ownership: automation-managed -->
            - Include:
              - `# Configuration`
              - `## CMake Options`
              - `## Environment Variables`
              - `## Tooling`
            - Use only options, variables, and tooling supported by the input.
            EOF
                            ;;
                          documentation_review_md)
                            cat > "$requirements_file" <<'EOF'
            ## Target Page Requirements
            - Page key: `documentation_review_md`
            - Output file: `Documentation-Review.md`
            - Must begin with exactly:
              <!-- page-ownership: automation-managed -->
            - Include:
              - `# Documentation Review`
              - `## Summary`
              - `## Change Categories`
              - `## Review Mode`
              - `## Ownership Model`
              - `## Reviewed Inputs`
              - `## Changed Files`
              - `## AI Analysis Notes`
            - `Reviewed Inputs` must summarize actual reviewed scope honestly.
            - `Changed Files` must use exact file paths from the input.
            - If many changed files are present, group them under repository-specific subsections when supported by the file paths.
            - `AI Analysis Notes` must contain 3 to 6 concise repository-specific bullet points and avoid filler text.
            EOF
                            ;;
            esac
          }

          generate_page() {
            local page_key="$1"
            local page_title="$2"
            local target_file="$3"

            local requirements_file="${RUNNER_TEMP}/${page_key}_requirements.md"
            local page_input_file="${RUNNER_TEMP}/${page_key}_input.md"
            local raw_output_file="${RUNNER_TEMP}/${page_key}.raw"
            local final_output_file="${RUNNER_TEMP}/${page_key}.md"

            write_page_requirements "$page_key" "$requirements_file"

            cat "${RUNNER_TEMP}/doc_agent_input.md" > "$page_input_file"
            printf '\n' >> "$page_input_file"
            cat "$requirements_file" >> "$page_input_file"

            if [[ -f "${{ env.WIKI_STAGING_DIR }}/$target_file" ]]; then
              cat >> "$page_input_file" <<EOF

            ## Existing Staged Page
            Use the existing staged page as baseline context. Preserve correct grounded content and revise minimally. Do not rewrite unaffected sections only for style.

            \`\`\`markdown
            $(cat "${{ env.WIKI_STAGING_DIR }}/$target_file")
            \`\`\`
            EOF
                        fi

                        cat "$page_input_file" | gh models run --file "${{ env.DOC_AGENT_PROMPT_FILE }}" --var page_key="$page_key" --var page_title="$page_title" > "$raw_output_file"

                        if head -n 1 "$raw_output_file" | grep -q '^```'; then
                          sed '1d;$d' "$raw_output_file" > "$final_output_file"
                        else
                          cp "$raw_output_file" "$final_output_file"
                        fi

                        test -s "$final_output_file"
                        cp "$final_output_file" "${{ env.WIKI_STAGING_DIR }}/$target_file"
                        printf '\n' >> "${{ env.WIKI_STAGING_DIR }}/$target_file"
                      }

                      if [[ "$(should_generate_page "$UPDATE_HOME" "Home.md")" == "true" ]]; then
                        generate_page "home_md" "Home" "Home.md"
                      fi

                      if [[ "$(should_generate_page "$UPDATE_BUILD_AND_RUN" "Build-and-Run.md")" == "true" ]]; then
                        generate_page "build_and_run_md" "Build and Run" "Build-and-Run.md"
                      fi

                      if [[ "$(should_generate_page "$UPDATE_PROJECT_STRUCTURE" "Project Structure")" == "true" ]]; then
                        generate_page "project_structure_md" "Project Structure" "Project-Structure.md"
                      fi

                      if [[ "$(should_generate_page "$UPDATE_ARCHITECTURE" "Architecture.md")" == "true" ]]; then
                        generate_page "architecture_md" "Architecture" "Architecture.md"
                      fi

                      if [[ "$(should_generate_page "$UPDATE_TESTING" "Testing.md")" == "true" ]]; then
                        generate_page "testing_md" "Testing" "Testing.md"
                      fi

                      if [[ "$(should_generate_page "$UPDATE_CONFIGURATION" "Configuration.md")" == "true" ]]; then
                        generate_page "configuration_md" "Configuration" "Configuration.md"
                      fi

                      if [[ "$(should_generate_page "$UPDATE_DOCUMENTATION_REVIEW" "Documentation-Review.md")" == "true" ]]; then
                        generate_page "documentation_review_md" "Documentation Review" "Documentation-Review.md"
                      fi

                      cat > "${{ env.WIKI_STAGING_DIR }}/_Sidebar.md" <<'EOF'
                      <!-- page-ownership: automation-managed -->

          # Wiki

          - [[Home]]
          - [[Build-and-Run]]
          - [[Project-Structure]]
          - [[Architecture]]
          - [[Testing]]
          - [[Configuration]]
          - [[Documentation-Review]]
          EOF

          cat > "${{ env.WIKI_STAGING_DIR }}/${{ env.WIKI_MANIFEST_FILE }}" <<'EOF'
          Home.md
          Build-and-Run.md
          Project-Structure.md
          Architecture.md
          Testing.md
          Configuration.md
          Documentation-Review.md
          _Sidebar.md
          EOF

      - name: Doc-Agent - Validate staged wiki content
        if: steps.doc_agent_detect.outputs.relevant_change_detected == 'true'
        shell: bash
        run: |
          required_files=(
            "${{ env.WIKI_STAGING_DIR }}/Home.md"
            "${{ env.WIKI_STAGING_DIR }}/Build-and-Run.md"
            "${{ env.WIKI_STAGING_DIR }}/Project-Structure.md"
            "${{ env.WIKI_STAGING_DIR }}/Architecture.md"
            "${{ env.WIKI_STAGING_DIR }}/Testing.md"
            "${{ env.WIKI_STAGING_DIR }}/Configuration.md"
            "${{ env.WIKI_STAGING_DIR }}/Documentation-Review.md"
            "${{ env.WIKI_STAGING_DIR }}/_Sidebar.md"
            "${{ env.WIKI_STAGING_DIR }}/${{ env.WIKI_MANIFEST_FILE }}"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -s "$file" ]]; then
              echo "Required staging file is missing or empty: $file"
              exit 1
            fi
          done

          expected_manifest=$'Home.md\nBuild-and-Run.md\nProject-Structure.md\nArchitecture.md\nTesting.md\nConfiguration.md\nDocumentation-Review.md\n_Sidebar.md'
          actual_manifest="$(cat "${{ env.WIKI_STAGING_DIR }}/${{ env.WIKI_MANIFEST_FILE }}")"

          if [[ "$actual_manifest" != "$expected_manifest" ]]; then
            echo "Unexpected manifest content."
            exit 1
          fi

      - name: Doc-Agent - Create or update staging pull request
        if: steps.doc_agent_detect.outputs.relevant_change_detected == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "docs(wiki-staging): refresh AI-analyzed wiki content"
          branch: automation/wiki-staging
          delete-branch: true
          title: "docs(wiki-staging): refresh AI-analyzed wiki content"
          body: |
            ## Summary

            This pull request contains Doc-Agent AI-analyzed wiki staging content for review.

            ## Included staging files

            - `.github/wiki-staging/Home.md`
            - `.github/wiki-staging/Build-and-Run.md`
            - `.github/wiki-staging/Project-Structure.md`
            - `.github/wiki-staging/Architecture.md`
            - `.github/wiki-staging/Testing.md`
            - `.github/wiki-staging/Configuration.md`
            - `.github/wiki-staging/Documentation-Review.md`
            - `.github/wiki-staging/_Sidebar.md`
            - `.github/wiki-staging/.wiki-managed-files`

            ## Review notes

            - Review the staged wiki content in this pull request.
            - Merge only if the prepared content is suitable for wiki publication.
            - After merge, the Wiki-Agent will publish the approved staging content to the GitHub Wiki.
          base: main
          add-paths: |
            .github/wiki-staging/**