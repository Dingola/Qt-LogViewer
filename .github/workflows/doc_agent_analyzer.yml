name: Doc Agent Analyzer

#------------------------------------------------
# Workflow Triggers
#------------------------------------------------
on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'QT_Project/**'
      - 'QT_Project_Tests/**'
      - 'Configs/**'
  workflow_dispatch:
    inputs:
      full_scan:
        description: Analyze repository documentation inputs with AI and refresh wiki staging
        required: false
        default: true
        type: boolean

#------------------------------------------------
# Permissions
#------------------------------------------------
permissions:
  contents: write
  pull-requests: write
  models: read

#------------------------------------------------
# Environment Variables
#------------------------------------------------
env:
  WIKI_STAGING_DIR: .github/wiki-staging
  WIKI_MANIFEST_FILE: .wiki-managed-files
  DOC_AGENT_PROMPT_FILE: .github/prompts/doc_agent_analyzer.prompt.yml

#------------------------------------------------
# Workflow jobs
#------------------------------------------------
jobs:
  doc_agent_analyzer:
    name: Doc-Agent Analyze and Stage Wiki Content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install GitHub Models extension
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh extension install https://github.com/github/gh-models || gh extension upgrade gh-models

      - name: Doc-Agent - Detect documentation inputs to analyze
        id: doc_agent_detect
        shell: bash
        run: |
          before_sha="${{ github.event.before }}"
          after_sha="${{ github.sha }}"
          zero_sha="0000000000000000000000000000000000000000"
          full_scan_requested=false
          changed_files=""

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.full_scan }}" == "true" ]]; then
            full_scan_requested=true
            changed_files="$(git ls-files README.md QT_Project QT_Project_Tests Configs 2>/dev/null || true)"
          else
            if [[ -n "$before_sha" && "$before_sha" != "$zero_sha" ]]; then
              changed_files="$(git diff --name-only "$before_sha" "$after_sha")"
            else
              changed_files="$(git ls-files README.md QT_Project QT_Project_Tests Configs 2>/dev/null || true)"
            fi
          fi

          readme_changed=false
          source_comments_changed=false
          tests_changed=false
          configs_changed=false
          relevant_change_detected=false

          while IFS= read -r file; do
            if [[ -n "$file" ]]; then
              case "$file" in
                README.md)
                  readme_changed=true
                  relevant_change_detected=true
                  ;;
                QT_Project/*)
                  source_comments_changed=true
                  relevant_change_detected=true
                  ;;
                QT_Project_Tests/*)
                  tests_changed=true
                  relevant_change_detected=true
                  ;;
                Configs/*)
                  configs_changed=true
                  relevant_change_detected=true
                  ;;
              esac
            fi
          done <<< "$changed_files"

          {
            echo "full_scan_requested=$full_scan_requested"
            echo "readme_changed=$readme_changed"
            echo "source_comments_changed=$source_comments_changed"
            echo "tests_changed=$tests_changed"
            echo "configs_changed=$configs_changed"
            echo "relevant_change_detected=$relevant_change_detected"
            echo "changed_files<<EOF"
            echo "$changed_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Doc-Agent - Build AI analysis input
        if: steps.doc_agent_detect.outputs.relevant_change_detected == 'true'
        shell: bash
        env:
          REPOSITORY_NAME: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          FULL_SCAN_REQUESTED: ${{ steps.doc_agent_detect.outputs.full_scan_requested }}
          README_CHANGED: ${{ steps.doc_agent_detect.outputs.readme_changed }}
          SOURCE_COMMENTS_CHANGED: ${{ steps.doc_agent_detect.outputs.source_comments_changed }}
          TESTS_CHANGED: ${{ steps.doc_agent_detect.outputs.tests_changed }}
          CONFIGS_CHANGED: ${{ steps.doc_agent_detect.outputs.configs_changed }}
          CHANGED_FILES: ${{ steps.doc_agent_detect.outputs.changed_files }}
        run: |
          output_file="${RUNNER_TEMP}/doc_agent_input.md"
          max_total_chars=120000
          max_file_chars=6000
          total_chars=0

          is_monitored() {
            case "$1" in
              README.md|QT_Project/*|QT_Project_Tests/*|Configs/*) return 0 ;;
              *) return 1 ;;
            esac
          }

          append_text() {
            local text="$1"
            local text_len
            text_len=$(printf "%s" "$text" | wc -c)

            if (( total_chars + text_len > max_total_chars )); then
              return
            fi

            printf "%s" "$text" >> "$output_file"
            total_chars=$((total_chars + text_len))
          }

          append_file_section() {
            local file_path="$1"

            if ! is_monitored "$file_path"; then
              return
            fi

            if [[ ! -f "$file_path" ]]; then
              return
            fi

            local excerpt
            excerpt="$(head -c "$max_file_chars" "$file_path")"

            append_text "$(printf '\n## File: %s\n\n```text\n%s\n```\n' "$file_path" "$excerpt")"
          }

          : > "$output_file"

          cat > "${RUNNER_TEMP}/doc_agent_header.md" <<EOF
          # Doc-Agent Analysis Input

          - Repository: ${REPOSITORY_NAME}
          - Commit: ${COMMIT_SHA}
          - Full scan requested: ${FULL_SCAN_REQUESTED}
          - README changed: ${README_CHANGED}
          - Source comments changed: ${SOURCE_COMMENTS_CHANGED}
          - Tests changed: ${TESTS_CHANGED}
          - Configs changed: ${CONFIGS_CHANGED}

          ## Changed Files
          EOF

          append_text "$(cat "${RUNNER_TEMP}/doc_agent_header.md")"
          append_text $'\n'

          if [[ -n "$CHANGED_FILES" ]]; then
            while IFS= read -r file; do
              if [[ -n "$file" ]]; then
                append_text "- \`$file\`"$'\n'
              fi
            done <<< "$CHANGED_FILES"
          else
            append_text "- None"$'\n'
          fi

          append_file_section "README.md"

          while IFS= read -r changed_file; do
            if [[ -n "$changed_file" ]]; then
              append_file_section "$changed_file"
            fi
          done <<< "$CHANGED_FILES"

          echo "AI input written to $output_file"
      - name: Doc-Agent - Generate reviewable wiki staging with GitHub Models
        if: steps.doc_agent_detect.outputs.relevant_change_detected == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -x
          rm -rf "${{ env.WIKI_STAGING_DIR }}"
          echo "rm ok"

          mkdir -p "${{ env.WIKI_STAGING_DIR }}"
          echo "mkdir ok"

          raw_output_file="${RUNNER_TEMP}/doc_agent_output.raw"
          json_output_file="${RUNNER_TEMP}/doc_agent_output.json"

          test -f "${{ env.DOC_AGENT_PROMPT_FILE }}"
          echo "prompt file ok"

          test -f "${RUNNER_TEMP}/doc_agent_input.md"
          echo "input file ok"

          gh models run --file "${{ env.DOC_AGENT_PROMPT_FILE }}" < "${RUNNER_TEMP}/doc_agent_input.md" > "$raw_output_file"
          echo "gh models run ok"

          if head -n 1 "$raw_output_file" | grep -q '^```'; then
            sed '1d;$d' "$raw_output_file" > "$json_output_file"
          else
            cp "$raw_output_file" "$json_output_file"
          fi
          echo "json extraction ok"

          jq -e 'has("home_md") and has("documentation_review_md")' "$json_output_file" > /dev/null
          echo "json validation ok"

          jq -r '.home_md' "$json_output_file" > "${{ env.WIKI_STAGING_DIR }}/Home.md"
          printf '\n' >> "${{ env.WIKI_STAGING_DIR }}/Home.md"

          jq -r '.documentation_review_md' "$json_output_file" > "${{ env.WIKI_STAGING_DIR }}/Documentation-Review.md"
          printf '\n' >> "${{ env.WIKI_STAGING_DIR }}/Documentation-Review.md"

          cat > "${{ env.WIKI_STAGING_DIR }}/_Sidebar.md" <<'EOF'
          <!-- page-ownership: automation-managed -->

          # Wiki

          - [[Home]]
          - [[Documentation-Review]]
          EOF

          cat > "${{ env.WIKI_STAGING_DIR }}/${{ env.WIKI_MANIFEST_FILE }}" <<'EOF'
          Home.md
          Documentation-Review.md
          _Sidebar.md
          EOF

          echo "staging write ok"

      - name: Doc-Agent - Validate staged wiki content
        if: steps.doc_agent_detect.outputs.relevant_change_detected == 'true'
        shell: bash
        run: |
          required_files=(
            "${{ env.WIKI_STAGING_DIR }}/Home.md"
            "${{ env.WIKI_STAGING_DIR }}/Documentation-Review.md"
            "${{ env.WIKI_STAGING_DIR }}/_Sidebar.md"
            "${{ env.WIKI_STAGING_DIR }}/${{ env.WIKI_MANIFEST_FILE }}"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -s "$file" ]]; then
              echo "Required staging file is missing or empty: $file"
              exit 1
            fi
          done

          expected_manifest=$'Home.md\nDocumentation-Review.md\n_Sidebar.md'
          actual_manifest="$(cat "${{ env.WIKI_STAGING_DIR }}/${{ env.WIKI_MANIFEST_FILE }}")"

          if [[ "$actual_manifest" != "$expected_manifest" ]]; then
            echo "Unexpected manifest content."
            exit 1
          fi

      - name: Doc-Agent - Create or update staging pull request
        if: steps.doc_agent_detect.outputs.relevant_change_detected == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "docs(wiki-staging): refresh AI-analyzed wiki content"
          branch: automation/wiki-staging
          delete-branch: true
          title: "docs(wiki-staging): refresh AI-analyzed wiki content"
          body: |
            ## Summary

            This pull request contains Doc-Agent AI-analyzed wiki staging content for review.

            ## Included staging files

            - `.github/wiki-staging/Home.md`
            - `.github/wiki-staging/Documentation-Review.md`
            - `.github/wiki-staging/_Sidebar.md`
            - `.github/wiki-staging/.wiki-managed-files`

            ## Review notes

            - Review the staged wiki content in this pull request.
            - Merge only if the prepared content is suitable for wiki publication.
            - After merge, the Wiki-Agent will publish the approved staging content to the GitHub Wiki.
          base: main
          add-paths: |
            .github/wiki-staging/**