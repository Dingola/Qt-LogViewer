name: Doc Agent Prepare

#------------------------------------------------
# Workflow Triggers
#------------------------------------------------
on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'QT_Project/**'
      - 'QT_Project_Tests/**'
      - 'Configs/**'
  workflow_dispatch:
    inputs:
      full_scan:
        description: Prepare wiki staging from the full project scope
        required: false
        default: true
        type: boolean

#------------------------------------------------
# Permissions
#------------------------------------------------
permissions:
  contents: write
  pull-requests: write

#------------------------------------------------
# Environment Variables
#------------------------------------------------
env:
  WIKI_STAGING_DIR: .github/wiki-staging
  WIKI_MANIFEST_FILE: .wiki-managed-files

#------------------------------------------------
# Workflow jobs
#------------------------------------------------
jobs:
  doc_agent_prepare:
    name: Doc-Agent Prepare Wiki Staging
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      #------------------------------------------------
      # Doc-Agent
      #------------------------------------------------
      - name: Doc-Agent - Detect documentation inputs to review
        id: doc_agent_detect
        shell: bash
        run: |
          before_sha="${{ github.event.before }}"
          after_sha="${{ github.sha }}"
          zero_sha="0000000000000000000000000000000000000000"
          full_scan_requested=false
          changed_files=""

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.full_scan }}" == "true" ]]; then
            full_scan_requested=true
            changed_files="$(git ls-files README.md QT_Project QT_Project_Tests Configs 2>/dev/null || true)"
          else
            if [[ -n "$before_sha" && "$before_sha" != "$zero_sha" ]]; then
              changed_files="$(git diff --name-only "$before_sha" "$after_sha")"
            else
              changed_files="$(git ls-files README.md QT_Project QT_Project_Tests Configs 2>/dev/null || true)"
            fi
          fi

          readme_changed=false
          qt_project_changed=false
          qt_project_tests_changed=false
          configs_changed=false
          relevant_change_detected=false

          while IFS= read -r file; do
            if [[ -n "$file" ]]; then
              case "$file" in
                README.md)
                  readme_changed=true
                  relevant_change_detected=true
                  ;;
                QT_Project/*)
                  qt_project_changed=true
                  relevant_change_detected=true
                  ;;
                QT_Project_Tests/*)
                  qt_project_tests_changed=true
                  relevant_change_detected=true
                  ;;
                Configs/*)
                  configs_changed=true
                  relevant_change_detected=true
                  ;;
              esac
            fi
          done <<< "$changed_files"

          {
            echo "full_scan_requested=$full_scan_requested"
            echo "readme_changed=$readme_changed"
            echo "qt_project_changed=$qt_project_changed"
            echo "qt_project_tests_changed=$qt_project_tests_changed"
            echo "configs_changed=$configs_changed"
            echo "relevant_change_detected=$relevant_change_detected"
            echo "changed_files<<EOF"
            echo "$changed_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Doc-Agent - Prepare reviewable wiki staging
        if: steps.doc_agent_detect.outputs.relevant_change_detected == 'true'
        shell: bash
        env:
          FULL_SCAN_REQUESTED: ${{ steps.doc_agent_detect.outputs.full_scan_requested }}
          README_CHANGED: ${{ steps.doc_agent_detect.outputs.readme_changed }}
          QT_PROJECT_CHANGED: ${{ steps.doc_agent_detect.outputs.qt_project_changed }}
          QT_PROJECT_TESTS_CHANGED: ${{ steps.doc_agent_detect.outputs.qt_project_tests_changed }}
          CONFIGS_CHANGED: ${{ steps.doc_agent_detect.outputs.configs_changed }}
          CHANGED_FILES: ${{ steps.doc_agent_detect.outputs.changed_files }}
        run: |
          rm -rf "${{ env.WIKI_STAGING_DIR }}"
          mkdir -p "${{ env.WIKI_STAGING_DIR }}"

          if [[ -f README.md ]]; then
            cp README.md "${{ env.WIKI_STAGING_DIR }}/Home.md"
          else
            cat > "${{ env.WIKI_STAGING_DIR }}/Home.md" <<'EOF'
          # Qt-LogViewer Wiki

          The repository `README.md` was not found during the Doc-Agent run.
          EOF
          fi

          cat > "${{ env.WIKI_STAGING_DIR }}/Documentation-Review.md" <<EOF
          # Documentation Review

          ## Summary

          The Doc-Agent reviewed the repository documentation inputs and prepared the wiki staging content for review.

          - Full scan requested: ${FULL_SCAN_REQUESTED}
          - README changed: ${README_CHANGED}
          - QT_Project changed: ${QT_PROJECT_CHANGED}
          - QT_Project_Tests changed: ${QT_PROJECT_TESTS_CHANGED}
          - Configs changed: ${CONFIGS_CHANGED}

          ## Reviewed Inputs

          - \`README.md\`
          - \`QT_Project/**\`
          - \`QT_Project_Tests/**\`
          - \`Configs/**\`

          ## Source Commit

          - Commit: \`${{ github.sha }}\`

          ## Review Requirement

          This staging content must be reviewed and approved in the main repository before the Wiki-Agent publishes it to the GitHub Wiki.

          ## Changed Files

          EOF

          if [[ -n "$CHANGED_FILES" ]]; then
            while IFS= read -r file; do
              if [[ -n "$file" ]]; then
                echo "- \`$file\`" >> "${{ env.WIKI_STAGING_DIR }}/Documentation-Review.md"
              fi
            done <<< "$CHANGED_FILES"
          else
            echo "- No changed files were detected." >> "${{ env.WIKI_STAGING_DIR }}/Documentation-Review.md"
          fi

          cat > "${{ env.WIKI_STAGING_DIR }}/_Sidebar.md" <<'EOF'
          # Wiki

          - [[Home]]
          - [[Documentation-Review]]
          EOF

          cat > "${{ env.WIKI_STAGING_DIR }}/${{ env.WIKI_MANIFEST_FILE }}" <<'EOF'
          Home.md
          Documentation-Review.md
          _Sidebar.md
          EOF

      - name: Doc-Agent - Create or update staging pull request
        if: steps.doc_agent_detect.outputs.relevant_change_detected == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "docs(wiki-staging): refresh prepared wiki content"
          branch: automation/wiki-staging
          delete-branch: true
          title: "docs(wiki-staging): refresh prepared wiki content"
          body: |
            ## Summary

            This pull request contains Doc-Agent prepared wiki staging content for review.

            ## Included staging files

            - `.github/wiki-staging/Home.md`
            - `.github/wiki-staging/Documentation-Review.md`
            - `.github/wiki-staging/_Sidebar.md`
            - `.github/wiki-staging/.wiki-managed-files`

            ## Review notes

            - Review the staged wiki content in this pull request.
            - Merge only if the prepared content is suitable for wiki publication.
            - After merge, the Wiki-Agent will publish the approved staging content to the GitHub Wiki.
          base: main
          add-paths: |
            .github/wiki-staging/**
            .github/wiki-staging/.wiki-managed-files